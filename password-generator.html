<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas - Utillitys</title>
    <meta name="description" content="Gere senhas fortes e personalizadas com opções de comprimento, maiúsculas, minúsculas, números e símbolos.">
    <!-- Open Graph -->
    <meta property="og:title" content="Gerador de Senhas - Utillitys">
    <meta property="og:description" content="Crie senhas seguras e personalizadas rapidamente.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://akiradv.github.io/utillitys/password-generator.html">
    <meta property="og:image" content="https://akiradv.github.io/utillitys/images/og-password.png">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Gerador de Senhas - Utillitys">
    <meta name="twitter:description" content="Gere senhas fortes e personalizadas com facilidade.">
    <meta name="twitter:image" content="https://akiradv.github.io/utillitys/images/og-password.png">
    <!-- Estilos e ícones -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Utillitys">
</head>
<body>
    <header>
        <h1>🔐 Gerador de Senhas</h1>
        <a href="index.html" class="btn-voltar">← Voltar</a>
    </header>

    <main>
        <div class="password-generator-modern">
            <!-- Campo de exibição da senha -->
            <div class="password-display-modern">
                <input type="text" id="password" readonly>
                <button id="show-password" class="btn-icon" onclick="togglePasswordVisibility()">
                    <i class="fas fa-eye"></i>
                </button>
                <button id="copy-password" class="btn-icon" onclick="copyToClipboard()">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <!-- Controles -->
            <div class="controls-grid">
                <!-- Comprimento -->
                <div class="control-group">
                    <label for="length-range">Comprimento: <span id="length-value">12</span></label>
                    <input type="range" id="length-range" min="4" max="32" value="12">
                    <input type="number" id="length-number" min="4" max="32" value="12" class="length-number">
                </div>

                <!-- Opções de caracteres -->
                <div class="control-group options-group">
                    <label><input type="checkbox" id="include-uppercase" checked> Maiúsculas (A-Z)</label>
                    <label><input type="checkbox" id="include-lowercase" checked> Minúsculas (a-z)</label>
                    <label><input type="checkbox" id="include-numbers" checked> Números (0-9)</label>
                    <label><input type="checkbox" id="include-symbols" checked> Símbolos (!@#$%...)</label>
                </div>
            </div>

            <!-- Botão gerar -->
            <button id="generate-btn" class="btn btn-primary">🔁 Gerar Nova Senha</button>

            <!-- Indicador de força -->
            <div class="strength-indicator">
                <span class="strength-label">Força:</span>
                <span id="strength-text" class="strength-text">Média</span>
                <div class="strength-bar">
                    <div id="strength-bar-fill" class="strength-bar-fill" style="width: 60%;"></div>
                </div>
            </div>

            <!-- Notificações -->
            <div id="notification" class="notification hidden">Senha copiada!</div>
        </div>

        <button class="btn voltar" onclick="window.location.href='index.html'">Voltar</button>
    </main>

    <footer>
        <p>&copy; 2026 Utillitys. Desenvolvido com ❤️ por <a href="https://github.com/akiradv" target="_blank">AkiraDev</a></p>
    </footer>

    <script src="script.js"></script>
    <div id="notificationsContainer"></div>
</body>
</html>
