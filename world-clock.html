<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Mundial - Utillitys</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Relógio Mundial</h1>
        <a href="index.html" class="voltar" style="text-decoration:none;">← Voltar</a>
    </header>
    <main>
        <div class="clock-container">
            <div class="clock-card" id="local">
                <h3>📍 Sua localização</h3>
                <div class="time" id="local-time">--:--:--</div>
                <div class="date" id="local-date">--</div>
            </div>
            <div class="clock-card" id="new-york">
                <h3>🗽 Nova York</h3>
                <div class="time" id="ny-time">--:--:--</div>
                <div class="date" id="ny-date">--</div>
            </div>
            <div class="clock-card" id="london">
                <h3>🇬🇧 Londres</h3>
                <div class="time" id="london-time">--:--:--</div>
                <div class="date" id="london-date">--</div>
            </div>
            <div class="clock-card" id="tokyo">
                <h3>🇯🇵 Tóquio</h3>
                <div class="time" id="tokyo-time">--:--:--</div>
                <div class="date" id="tokyo-date">--</div>
            </div>
            <div class="clock-card" id="sydney">
                <h3>🇦🇺 Sydney</h3>
                <div class="time" id="sydney-time">--:--:--</div>
                <div class="date" id="sydney-date">--</div>
            </div>
            <div class="clock-card" id="berlin">
                <h3>🇩🇪 Berlim</h3>
                <div class="time" id="berlin-time">--:--:--</div>
                <div class="date" id="berlin-date">--</div>
            </div>
        </div>
        <button class="voltar" onclick="window.location.href='index.html'">Voltar</button>

    <footer>
        <p>&copy; 2026 Utillitys. Desenvolvido com ❤️ por <a href="https://github.com/akiradv" target="_blank">AkiraDev</a> </p>
    </footer>

    </main>
    <script src="script.js"></script>
</body>
</html>
