<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas - Utillitys</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Utillitys">
    <link rel="apple-touch-icon" href="images/icon-192.png">
</head>
<body>
    <header>
        <h1>💱 Conversor de Moedas</h1>
        <a href="index.html" class="btn-sobre" style="text-decoration:none;">← Voltar</a>
    </header>
    <main>
        <div class="converter-container">
            <div class="converter-box">
                <div class="input-group">
                    <label>Valor</label>
                    <input type="number" id="amount" value="1" step="any" min="0">
                </div>
                <div class="input-group">
                    <label>De</label>
                    <select id="from-currency">
                        <option value="USD">USD - Dólar Americano</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="GBP">GBP - Libra Esterlina</option>
                        <option value="BRL" selected>BRL - Real Brasileiro</option>
                        <option value="ARS">ARS - Peso Argentino</option>
                        <option value="CLP">CLP - Peso Chileno</option>
                        <option value="MXN">MXN - Peso Mexicano</option>
                        <option value="CAD">CAD - Dólar Canadense</option>
                        <option value="JPY">JPY - Iene Japonês</option>
                        <option value="CNY">CNY - Yuan Chinês</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Para</label>
                    <select id="to-currency">
                        <option value="USD">USD - Dólar Americano</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="GBP">GBP - Libra Esterlina</option>
                        <option value="BRL">BRL - Real Brasileiro</option>
                        <option value="ARS">ARS - Peso Argentino</option>
                        <option value="CLP">CLP - Peso Chileno</option>
                        <option value="MXN">MXN - Peso Mexicano</option>
                        <option value="CAD">CAD - Dólar Canadense</option>
                        <option value="JPY">JPY - Iene Japonês</option>
                        <option value="CNY">CNY - Yuan Chinês</option>
                    </select>
                </div>
                <button id="convert-btn" class="btn">Converter</button>
                <div id="result-converter" class="resultado-conversao">
                    <p>Resultado: <span id="converted-amount">--</span></p>
                    <p id="rate-info"></p>
                </div>
            </div>
        </div>
        <button class="voltar" onclick="window.location.href='index.html'">Voltar</button>
    </main>
    <footer>
        <p>&copy; 2026 Utillitys. Desenvolvido com ❤️ por <a href="https://github.com/akiradv" target="_blank">AkiraDev</a></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
